{% extends "base.html" %}
{% block title %}신청하기 · 중소기업 AI 도입 컨설팅{% endblock %}
{% block content %}
<section class="section">
  <div class="form-wrap">
    <div class="form-head">
      <h1>컨설팅 신청</h1>
      <p class="muted">이메일과 휴대폰번호를 남겨주시면 순서대로 연락드립니다. <strong>매주 정원 4명</strong>.</p>
    </div>

    {% if message %}
      <div class="alert alert--{{ message_type }}">{{ message }}</div>
    {% endif %}

    <form class="form card" method="post" action="/apply">
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" name="email" placeholder="you@example.com"
               value="{{ email or '' }}" required>
      </div>
      <div class="field">
        <label for="phone">휴대폰번호</label>
        <input id="phone" type="tel" name="phone" placeholder="010-1234-5678"
               value="{{ phone or '' }}" required>
        <p class="hint">신청 내역 조회 시 본인 확인에 사용됩니다.</p>
      </div>
      <button class="btn btn--primary btn--block btn--lg" type="submit">신청하기</button>
    </form>

    <p class="muted center small">이미 신청하셨나요? <a href="/my">내 신청 내역 보기</a></p>
  </div>
</section>
{% endblock %}
