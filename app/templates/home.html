{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>중소기업 AI 도입 컨설팅 신청</h1>
  <p class="lead">
    인력도 자금도 늘 빠듯한 중소기업 대표님을 위한 AI 도입 컨설팅.
    <strong>회원가입 없이</strong> 이메일과 휴대폰번호만 남기면 신청됩니다.
  </p>
  <div class="cta-row">
    <a class="btn btn-primary" href="/apply">지금 신청하기</a>
    <a class="btn btn-ghost" href="/my">내 신청 내역 보기</a>
  </div>
</section>

<section class="points">
  <div class="point"><h3>로그인 불필요</h3><p>이메일·휴대폰번호 2개만 입력, 30초 신청</p></div>
  <div class="point"><h3>주 4명 한정</h3><p>매주 정원 4명, 감당 가능한 만큼만 접수</p></div>
  <div class="point"><h3>내 내역 확인</h3><p>언제든 신청 상태를 다시 확인</p></div>
</section>
{% endblock %}
