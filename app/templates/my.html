{% extends "base.html" %}
{% block title %}내 신청 내역 · 중소기업 AI 도입 컨설팅{% endblock %}
{% block content %}
<section class="section">
  <div class="form-wrap">
    <div class="form-head">
      <h1>내 신청 내역 조회</h1>
      <p class="muted">신청할 때 입력한 이메일과 휴대폰번호를 <strong>모두</strong> 입력해주세요.</p>
    </div>

    <form class="form card" method="post" action="/my">
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" name="email" placeholder="you@example.com"
               value="{{ email or '' }}" required>
      </div>
      <div class="field">
        <label for="phone">휴대폰번호</label>
        <input id="phone" type="tel" name="phone" placeholder="010-1234-5678"
               value="{{ phone or '' }}" required>
      </div>
      <button class="btn btn--primary btn--block btn--lg" type="submit">조회하기</button>
    </form>

    {% if searched %}
      <div class="result">
        {% if message %}
          <div class="alert alert--{{ message_type }}">{{ message }}</div>
        {% endif %}
      </div>
    {% endif %}

    <p class="muted center small">아직 신청 전이신가요? <a href="/apply">컨설팅 신청하기</a></p>
  </div>
</section>
{% endblock %}
