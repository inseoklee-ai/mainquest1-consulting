{% extends "base.html" %}
{% block title %}회원가입 · 중소기업 AI 도입 컨설팅{% endblock %}
{% block content %}
<section class="section">
  <div class="form-wrap">
    <div class="form-head">
      <h1>회원가입</h1>
      <p class="muted">가입은 선택입니다. 가입하면 다음부터 로그인만으로 내 신청을 확인할 수 있어요.</p>
    </div>

    {% if message %}
      <div class="alert alert--{{ message_type }}">{{ message }}</div>
    {% endif %}

    <form class="form card" method="post" action="/signup">
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" name="email" placeholder="you@example.com"
               value="{{ email or '' }}" required>
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" type="password" name="password" placeholder="6자 이상 권장" required>
      </div>
      <button class="btn btn--primary btn--block btn--lg" type="submit">회원가입</button>
    </form>

    <p class="muted center small">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
  </div>
</section>
{% endblock %}
